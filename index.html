<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fronus Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#0b1120;
color:white;

}

.container{

width:95%;
max-width:1400px;
margin:auto;
padding:25px;

}

header{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:35px;

}

header h1{

font-size:34px;
font-weight:700;

}

#status{

padding:10px 20px;
border-radius:30px;
background:#ff3b30;
font-weight:bold;

}

.cards{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;

}

.card{

background:#161b22;
padding:25px;
border-radius:18px;
border:1px solid #2d333b;
transition:.3s;

}

.card:hover{

transform:translateY(-5px);

}

.card h3{

color:#9ca3af;
font-size:18px;

}

.value{

margin-top:15px;
font-size:34px;
font-weight:bold;
color:#00d8ff;

}

.graph{

margin-top:35px;
background:#161b22;
padding:25px;
border-radius:18px;
border:1px solid #2d333b;

}

.graph h2{

margin-bottom:20px;

}

canvas{

width:100%;
height:350px;

}

footer{

margin-top:30px;
text-align:center;
color:#9ca3af;

}

@media(max-width:700px){

header{

flex-direction:column;
gap:15px;

}

header h1{

font-size:26px;

}

.value{

font-size:28px;

}

}

</style>

</head>

<body>

<div class="container">

<header>

<h1>☀️ FRONUS META-6KW</h1>

<div id="status">

🔴 OFFLINE

</div>

</header>
<div class="cards">

    <div class="card">
        <h3>☀️ Solar Power</h3>
        <div class="value" id="pvPower">0 W</div>
    </div>

    <div class="card">
        <h3>⚡ Grid Voltage</h3>
        <div class="value" id="gridVoltage">0 V</div>
    </div>

    <div class="card">
        <h3>🔌 Grid Current</h3>
        <div class="value" id="gridCurrent">0 A</div>
    </div>

    <div class="card">
        <h3>🏠 Load Power</h3>
        <div class="value" id="loadPower">0 W</div>
    </div>

    <div class="card">
        <h3>📈 Today's Energy</h3>
        <div class="value" id="todayEnergy">0.00 kWh</div>
    </div>

    <div class="card">
        <h3>📅 Total Energy</h3>
        <div class="value" id="totalEnergy">0.00 kWh</div>
    </div>

    <div class="card">
        <h3>🌡️ Temperature</h3>
        <div class="value" id="temperature">-- °C</div>
    </div>

    <div class="card">
        <h3>⚙️ Frequency</h3>
        <div class="value" id="frequency">50.0 Hz</div>
    </div>

</div>

<div class="graph">

    <h2>📊 Live Solar Power</h2>

    <canvas id="powerChart"></canvas>

</div>

<footer>

    Last Update:
    <span id="lastUpdate">Never</span>

</footer>
</div>

<script>

// JavaScript Part 3 yahan aayegi.

</script>

</body>
</html>
